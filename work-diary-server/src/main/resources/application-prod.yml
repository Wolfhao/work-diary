spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:work_diary}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USER:root}
    password: ${DB_PASS}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-wait: 2000ms
          max-idle: 8
          min-idle: 2

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

server:
  port: 8080

work-diary:
  storage:
    type: cos
    local:
      path: /data/upload/
      domain: ${LOCAL_UPLOAD_DOMAIN:http://localhost:8080}
      prefix: /files
    cos:
      region-id: ${COS_REGION:ap-shanghai}
      secret-id: ${COS_SECRET_ID}
      secret-key: ${COS_SECRET_KEY}
      bucket-name: ${COS_BUCKET}
      domain: ${COS_DOMAIN:}

wx:
  miniapp:
    appid: ${WX_APPID}
    secret: ${WX_SECRET}
    token: ${WX_TOKEN:}
    aesKey: ${WX_AESKEY:}
    msgDataFormat: JSON

sa-token:
  token-name: workDiaryAuthorization
  timeout: 2592000
  is-concurrent: false
  is-share: false
  token-style: uuid

# Knife4j 增强配置（核心：添加备案号）
knife4j:
  enable: true
  # 覆盖 Swagger UI 路径（Knife4j 增强版页面）
  setting:
    # 开启自定义底部
    enableFooterCustom: true
    # 自定义底部内容（这里放备案号）
    footerCustomContent: <div style="text-align:center; padding:10px 0; font-size:12px; color:#666;"><a href="https://beian.miit.gov.cn/" target="_blank" style="color:#666; text-decoration:none;">${BA_ID}</a></div>
    # 可选：保留原有 Knife4j 底部（如果想完全替换就设为 false）
    enableFooter: true
