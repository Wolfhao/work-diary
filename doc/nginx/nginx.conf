server {
    listen 80;
    server_name suntool.cloud;
    # 优化：快速关闭 HTTP 连接，减少资源占用
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;  # 优化1：启用 HTTP2，提升接口响应速度（兼容 HTTPS）
    server_name suntool.cloud;

    # SSL 证书配置（保持原有路径）
    ssl_certificate     /etc/nginx/ssl/suntool.online_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/suntool.online.key;

    # 优化2：SSL 安全加固 + 性能优化（适配现代浏览器，减少握手耗时）
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;  # 优化：复用 SSL 会话，减少握手消耗
    ssl_session_timeout 10m;             # SSL 会话超时时间，轻量场景足够
    ssl_stapling on;                     # 优化：OCSP 装订，提升证书验证速度
    ssl_stapling_verify on;
    resolver 8.8.8.8 114.114.114.114 valid=300s;
    resolver_timeout 5s;

    # 优化3：限制请求体大小（50M 保留，但增加缓冲区优化）
    client_max_body_size 50M;
    client_body_buffer_size 16k;         # 小请求直接放内存，减少磁盘 IO
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # 优化4：超时配置，避免长连接占用资源（轻量场景关键）
    proxy_connect_timeout 30s;           # 后端连接超时
    proxy_send_timeout 30s;              # 后端发送超时
    proxy_read_timeout 60s;              # 后端读取超时
    send_timeout 60s;                    # 客户端响应超时

    # 优化5：压缩静态资源/接口响应，减少带宽占用
    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_comp_level 2;                  # 低压缩级别，平衡 CPU/带宽
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    # 优化6：缓存控制，减少重复请求
    add_header Cache-Control "public, max-age=3600" always;
    add_header X-Frame-Options SAMEORIGIN;  # 安全加固：防止点击劫持
    add_header X-XSS-Protection "1; mode=block";  # 安全加固：防 XSS
    add_header X-Content-Type-Options nosniff;  # 安全加固：防止 MIME 嗅探

    # 代理后端接口（保留原有核心逻辑，优化参数）
    location / {
        proxy_pass         http://work-diary-server:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_buffering on;               # 优化：启用缓冲区，提升响应速度
        proxy_buffer_size 4k;              # 适配轻量场景的缓冲区大小
        proxy_buffers 8 4k;
    }

    # 本地存储模式文件访问（COS 模式可注释）
    # location /files/ {
    #     alias /data/upload/;
    #     expires 30d;
    #     add_header Cache-Control "public";
    #     add_header X-Content-Type-Options nosniff;
    # }

    # 优化7：禁止访问敏感文件，提升安全性
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}