version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Work Diary - Docker Compose
# MySQL 和 Redis 使用云上已有实例，通过 .env 配置连接地址
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 后端应用 ────────────────────────────────────────────────────────────────
  work-diary-server:
    build:
      context: ./work-diary-server
      dockerfile: Dockerfile
    image: work-diary-server:latest
    container_name: work-diary-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 数据库（填写云数据库地址）
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-work_diary}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS}
      # Redis（填写云 Redis 地址）
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS}
      # 微信小程序
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
      # 腾讯云 COS
      COS_REGION: ${COS_REGION:-ap-shanghai}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_DOMAIN: ${COS_DOMAIN:-}
    # 本地存储模式时挂载上传目录（COS 模式可不挂）
    volumes:
      - upload_data:/data/upload
    extra_hosts:
      - "host.docker.internal:host-gateway"  # 让容器访问宿主机，走内部 bridge，不走外网
    networks:
      - work-diary-net

  # ── Nginx（反向代理 + HTTPS）────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: work-diary-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./doc/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./doc/nginx/ssl:/etc/nginx/ssl:ro          # 放 SSL 证书
#      - upload_data:/data/upload:ro                 # 本地文件静态服务
    depends_on:
      - work-diary-server
    networks:
      - work-diary-net

volumes:
  upload_data:

networks:
  work-diary-net:
    driver: bridge
