version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Work Diary - Docker Compose
# 包含完整的 MySQL, Redis, 后端服务和 Nginx 代理
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 后端应用 ────────────────────────────────────────────────────────────────
  work-diary-server:
    build:
      context: ./work-diary-server
      dockerfile: Dockerfile
    image: work-diary-server:latest
    container_name: work-diary-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # 数据库（连接到容器内的 mysql 服务）
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-work_diary}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS}
      # Redis（连接到容器内的 redis 服务）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS}
      # 微信小程序
      WX_APPID: ${WX_APPID}
      WX_SECRET: ${WX_SECRET}
      # 腾讯云 COS
      COS_REGION: ${COS_REGION:-ap-shanghai}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_DOMAIN: ${COS_DOMAIN:-}
    # 本地存储模式时挂载上传目录（COS 模式可不挂）
    volumes:
      - upload_data:/data/upload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - work-diary-net

  # ── MySQL 5.7 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:5.7
    container_name: work-diary-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME:-work_diary}
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql_data:/var/lib/mysql
      - ./doc/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - work-diary-net

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: work-diary-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS}
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - work-diary-net

  # ── Nginx（反向代理 + HTTPS）────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: work-diary-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./doc/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./doc/nginx/ssl:/etc/nginx/ssl:ro          # 放 SSL 证书
      - upload_data:/data/upload:ro              # 挂载上传目录（COS 模式可不挂）
    depends_on:
      - work-diary-server
    networks:
      - work-diary-net

volumes:
  mysql_data:
  redis_data:
  upload_data:

networks:
  work-diary-net:
    driver: bridge
